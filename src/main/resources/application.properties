spring.application.name=accessiblity_backend

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/accessibility_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root1234

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL Init Configuration
spring.sql.init.mode=always
spring.sql.init.platform=mysql

# Logging Configuration
logging.level.root=INFO
logging.level.com.accessiblity.backend=DEBUG

# Spring Data REST Configuration
spring.data.rest.basePath=/api